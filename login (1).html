<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KATACHI — 會員登入</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Noto+Sans+JP:wght@100;200;300&family=Noto+Serif+JP:wght@200;300&family=Cormorant+Garamond:ital,wght@0,300;1,200;1,300&display=swap"
    rel="stylesheet">

  <!-- Design Tokens（必須第一個引入） -->
  <link rel="stylesheet" href="../tokens.css">

  <!-- 登入頁樣式 -->
  <link rel="stylesheet" href="login1.css">
</head>

<body>

  <div class="auth-layout">

    <!-- ══ 左側：圖片 ══ -->
    <div class="auth-left">
      <!-- 替換成你的岩石圖路徑 -->
      <img class="auth-left-img" src="./images/ROCK.avif" alt="KATACHI background" />

      <div class="auth-brand">
        <a class="auth-brand-logo" href="../index.html">KATACHI</a>
        <span class="auth-brand-sub">形 · Training Encyclopedia</span>
      </div>

      <div class="auth-slogan">
        <div class="auth-slogan-line"></div>
        <p class="auth-slogan-text">
          精準的訓練，<br>始於對身體的理解。<br>每一組動作都應有其意義。
        </p>
      </div>
    </div>

    <!-- ══ 右側：表單 ══ -->
    <div class="auth-right">

      <div class="auth-deco-num">MEMBER · ACCESS</div>

      <!-- 關閉按鈕 → 回首頁 -->
      <a class="auth-close" href="../index.html" title="回到首頁">
        <span class="auth-close-x"></span>
        Close
      </a>

      <!-- Tab 切換 -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login', this)">登入</button>
        <button class="auth-tab" onclick="switchTab('register', this)">註冊</button>
      </div>

      <!-- 登入面板 -->
      <div class="auth-panel show" id="panel-login">
        <div class="auth-title">Welcome Back</div>
        <div class="auth-subtitle">登入你的 KATACHI 帳號</div>

        <div class="form-group">
          <label class="form-label">電子郵件</label>
          <input class="form-input" type="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">密碼</label>
          <input class="form-input" type="password" placeholder="••••••••">
          <div class="form-row-extra">
            <a class="form-link" href="#">忘記密碼？</a>
          </div>
        </div>

        <button class="btn-auth"><span>登入</span></button>

        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">OR</span>
          <div class="auth-divider-line"></div>
        </div>

        <button class="btn-google">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path
              d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
              fill="rgba(255,255,255,0.3)" />
            <path
              d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
              fill="rgba(255,255,255,0.3)" />
            <path
              d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
              fill="rgba(255,255,255,0.3)" />
            <path
              d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
              fill="rgba(255,255,255,0.3)" />
          </svg>
          Google 帳號登入
        </button>

        <div class="auth-switch">
          還沒有帳號？
          <button onclick="switchTab('register', document.querySelectorAll('.auth-tab')[1])">立即註冊</button>
        </div>
      </div>

      <!-- 註冊面板 -->
      <div class="auth-panel" id="panel-register">
        <div class="auth-title">Join Us</div>
        <div class="auth-subtitle">建立你的 KATACHI 帳號</div>

        <div class="form-group">
          <label class="form-label">姓名</label>
          <input class="form-input" type="text" placeholder="Your Name">
        </div>

        <div class="form-group">
          <label class="form-label">電子郵件</label>
          <input class="form-input" type="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">密碼</label>
          <input class="form-input" type="password" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label class="form-label">確認密碼</label>
          <input class="form-input" type="password" placeholder="••••••••">
        </div>

        <button class="btn-auth"><span>建立帳號</span></button>

        <div class="auth-terms">
          註冊即代表你同意 <a href="#">服務條款</a> 及 <a href="#">隱私政策</a>
        </div>

        <div class="auth-switch">
          已有帳號？
          <button onclick="switchTab('login', document.querySelectorAll('.auth-tab')[0])">立即登入</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    function switchTab(name, btn) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('show'));
      document.getElementById('panel-' + name).classList.add('show');
    }
  </script>

</body>

</html>
